name: Build ipk for FluxProxy

on:
  push:
    branches:
      - 'master'
      - 'dev'
    paths:
      - 'htdocs/**'
      - 'po/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches:
      - 'master'
      - 'dev'
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'htdocs/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  release:
    types:
      - published

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout apk
        uses: actions/checkout@v6
        with:
          repository: 'alpinelinux/apk-tools'
          path: 'apk-tools'
          fetch-depth: 0
          ref: 'b5a31c0d865342ad80be10d68f1bb3d3ad9b0866'

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot libssl-dev lua5.1 meson ninja-build

          pushd apk-tools
          meson setup build \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=enabled \
            -Dlua_version=5.1 \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo -E meson install -C build --strip
          popd

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-make-index.sh"
          sudo install -m0755 ipkg-make-index.sh /usr/local/bin/ipkg-make-index.sh

          curl -fLO "https://downloads.openwrt.org/releases/23.05.5/targets/x86/64/packages/usign_2020-05-23-f1f65026-1_x86_64.ipk"
          mkdir -p usign-ipk
          tar -xzf usign_*.ipk -C usign-ipk ./data.tar.gz
          tar -xzf usign-ipk/data.tar.gz -C usign-ipk ./usr/bin/usign
          sudo install -m0755 usign-ipk/usr/bin/usign /usr/local/bin/usign

          cat > mkhash <<'EOF'
          #!/bin/sh
          if [ "$1" = "sha256" ]; then
            shift
          fi
          sha256sum "$@" | awk '{print $1}'
          EOF
          chmod 0755 mkhash
          sudo install -m0755 mkhash /usr/local/bin/mkhash

      - name: Prepare signing keys
        if: github.event_name != 'pull_request'
        env:
          OPKG_USIGN_SECRET_B64: ${{ secrets.OPKG_USIGN_SECRET_B64 }}
          OPKG_USIGN_PUBLIC_B64: ${{ secrets.OPKG_USIGN_PUBLIC_B64 }}
          APK_SIGN_KEY_B64: ${{ secrets.APK_SIGN_KEY_B64 }}
          APK_SIGN_PUBLIC_B64: ${{ secrets.APK_SIGN_PUBLIC_B64 }}
        run: |
          if [ -n "${OPKG_USIGN_SECRET_B64}" ] && [ -n "${OPKG_USIGN_PUBLIC_B64}" ]; then
            printf '%s' "${OPKG_USIGN_SECRET_B64}" | base64 -d > "${RUNNER_TEMP}/fluxproxy-opkg.key"
            printf '%s' "${OPKG_USIGN_PUBLIC_B64}" | base64 -d > "${RUNNER_TEMP}/fluxproxy-opkg.pub"
            chmod 0600 "${RUNNER_TEMP}/fluxproxy-opkg.key"
            echo "OPKG_USIGN_KEY=${RUNNER_TEMP}/fluxproxy-opkg.key" >> "${GITHUB_ENV}"
            echo "OPKG_USIGN_PUBLIC=${RUNNER_TEMP}/fluxproxy-opkg.pub" >> "${GITHUB_ENV}"
          fi

          if [ -n "${APK_SIGN_KEY_B64}" ] && [ -n "${APK_SIGN_PUBLIC_B64}" ]; then
            printf '%s' "${APK_SIGN_KEY_B64}" | base64 -d > "${RUNNER_TEMP}/fluxproxy-apk.key"
            printf '%s' "${APK_SIGN_PUBLIC_B64}" | base64 -d > "${RUNNER_TEMP}/fluxproxy-apk.pub"
            chmod 0600 "${RUNNER_TEMP}/fluxproxy-apk.key"
            echo "APK_SIGN_KEY=${RUNNER_TEMP}/fluxproxy-apk.key" >> "${GITHUB_ENV}"
            echo "APK_SIGN_PUBLIC=${RUNNER_TEMP}/fluxproxy-apk.pub" >> "${GITHUB_ENV}"
          fi

      - name: Build ipk file
        run: |
          pushd .github
          fakeroot bash build-ipk.sh apk "${{ github.event_name }}"
          fakeroot bash build-ipk.sh ipk "${{ github.event_name }}"
          echo "APK_ASSET_NAME=$(ls *.apk)" >> $GITHUB_ENV
          echo "IPK_ASSET_NAME=$(ls *.ipk)" >> $GITHUB_ENV
          popd

      - name: Publishing APK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.APK_ASSET_NAME }}
          path: .github/${{ env.APK_ASSET_NAME }}
          archive: false

      - name: Publishing IPK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.IPK_ASSET_NAME }}
          path: .github/${{ env.IPK_ASSET_NAME }}
          archive: false

      - name: Publishing to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release'
        with:
          repo_token: ${{ github.token }}
          file: .github/luci-app-fluxproxy_*.*
          file_glob: true
          tag: ${{ github.ref }}

      - name: Build package feed
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p repo/releases
          cp .github/*.apk repo/releases/
          cp .github/*.ipk repo/releases/

          pushd repo/releases
          MKHASH=mkhash ipkg-make-index.sh . > Packages
          if [ -n "${OPKG_USIGN_KEY:-}" ]; then
            usign -S -m Packages -s "${OPKG_USIGN_KEY}"
            cp "${OPKG_USIGN_PUBLIC}" fluxproxy-opkg.pub
          else
            echo "::warning::OPKG signing secrets are not configured; opkg feed will remain unsigned."
          fi
          gzip -9c Packages > Packages.gz
          if [ -n "${APK_SIGN_PUBLIC:-}" ]; then
            cp "${APK_SIGN_PUBLIC}" fluxproxy-apk.pub
          else
            echo "::warning::APK signing secrets are not configured; apk feed will remain unsigned."
          fi
          apk ${APK_SIGN_KEY:+--sign-key "${APK_SIGN_KEY}"} --allow-untrusted mkndx \
            --output Packages.adb \
            --pkgname-spec '${name}_${version}_${arch}.apk' \
            *.apk
          popd

      - name: Publishing package feed to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name != 'pull_request'
        with:
          github_token: ${{ github.token }}
          publish_dir: ./repo
